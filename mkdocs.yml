site_name: CIDACS-RL Record Linkage Platform
site_description: CIDACS-RL Documentation
site_author: "Rafael Romão"
repo_url: https://github.com/rafael-romao/cidacsrl
repo_name: rafael-romao/cidacsrl
edit_uri: tree/main/docs/
theme:
  name: material
  language: pt-BR

plugins:
  - mkdocstrings:
      handlers:
          python:
              paths: [src]

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

nav:
  - 'Início': 'index.md'
  - 'Arquitetura':
    - 'Visão Geral': 'architecture/overview.md'
    - 'Fluxos de Execução': 'architecture/execution-flows.md'
    - 'Decisões de Arquitetura (ADR)':
      - 'ADR 001 - Arquitetura Hexagonal': 'adr/adr-001-arquitetura-hexagonal.md'
      - 'ADR 002 - Use Case Pattern': 'adr/adr-002-transicao-workflow-use-case.md'
      - 'ADR 003 - Work Units': 'adr/adr-003-work-units.md'
      - 'ADR 004 - Telemetria': 'adr/adr-004-telemetria.md'
      - 'ADR 005 - Documentação Arquitetural': 'adr/adr-005-documentacao-arquitetural.md'
      - 'ADR 006 - Reorganização Layer/Feature': 'adr/adr-006-reorganizacao-layer-feature.md'
      - 'ADR 007 - Bootstrap sem DI': 'adr/adr-007-bootstrap-sem-container-di.md'
      - 'ADR 008 - Salvamento Incremental por Fase': 'adr/adr-008-salvamento-incremental-por-fase.md'
      - 'ADR 009 - CLI Única Instalável': 'adr/adr-009-cli-unica-instalavel.md'
      - 'ADR 010 - Restrições Fora do Score (indexed_dataset_filter)': 'adr/adr-010-indexed-dataset-filter.md'
  - 'Guias de Uso':
    - 'Limpeza de Dados': 'user-guide/cleaning.md'
    - 'Indexação no Elasticsearch': 'user-guide/elasticsearch_indexing.md'
    - 'Linkage de Dados': 'user-guide/linkage.md'
    - 'Deduplicação': 'user-guide/deduplicate.md'
    - 'Execução em Cluster Spark': 'user-guide/cluster_execution.md'
