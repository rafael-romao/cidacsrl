# Variante de ambiente para exercitar features de EXECUÇÃO não cobertas pelo env
# principal, reutilizando as mesmas especificações de indexação e linkage:
#   - elasticsearch.search_strategy: "multisearch" (o principal usa "single")
#   - execution.sample_fraction  → amostragem reprodutível do source
#   - execution.partitioning.filter_partitions → processa apenas um subconjunto de UFs
#
# Uso: make run-e2e-pipeline ENV=linkage_acidentes_obitos_multisearch_env.yml
storage:
  source_path: "tests/data/input"
  source_format: "parquet"
  output_path: "tests/data/output"
  output_format: "parquet"

execution:
  audit_log_path: "tests/data/audit_logs"
  sample_fraction: 0.5
  sample_seed: 7
  partitioning:
    partition_column: "uf_acidente"
    filter_partitions: ["SP", "MG", "BA", "RJ"]

specification:
  indexing_path: "tests/fixtures/configs/specs/obitos_example_index.yml"
  linkage_path: "tests/fixtures/configs/specs/linkage_acidentes_obitos.yml"

spark:
  spark_configs:
    spark.master: "local[*]"
    spark.sql.shuffle.partitions: "2"
    spark.ui.enabled: "false"
    spark.jars.packages: "org.elasticsearch:elasticsearch-spark-30_2.12:9.1.8"
    spark.port.maxRetries: "100"

elasticsearch:
  host: "elasticsearch"
  port: 9200
  es_connection_url: "http://elasticsearch:9200"
  wan_only: true
  search_strategy: "multisearch"
