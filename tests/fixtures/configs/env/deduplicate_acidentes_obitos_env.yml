app_name: "CIDACS-RL Deduplicação — Acidentes × Óbitos (E2E)"

storage:
  source_path: "tests/data/output/acidentes_obitos/phase_match=fase_exata"
  source_format: "parquet"
  output_path: "tests/output/dedup_acidentes_obitos"
  output_format: "parquet"

spark:
  spark_configs:
    spark.master: "local[*]"
    spark.driver.memory: "2g"
    spark.sql.shuffle.partitions: "2"
    spark.sql.adaptive.enabled: "false"
    spark.ui.enabled: "false"
    spark.jars.packages: "graphframes:graphframes:0.8.3-spark3.5-s_2.12"
    spark.jars.repositories: "https://repos.spark-packages.org/"

deduplication:
  id_source_column: "source_codigo_acidente"
  id_target_column: "candidate_codigo_obito"
  output_group_id_column: "cidacs_cluster_id"
