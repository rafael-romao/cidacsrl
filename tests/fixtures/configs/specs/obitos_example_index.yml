source_config:
  source_table: "obitos_example"
  id_field: "codigo_obito"


index_config:  
  name: "obitos_example_index"
  id_from_source: True  
  number_of_shards: 1
  number_of_replicas: 0
  refresh_interval: "1s"

index_columns:
  - name: "codigo_obito"
    type: "keyword"
  - name: "nome_completo"
    type: "text"
    index_as: "both"
  - name: "nome_mae"
    type: "text"
    index_as: "both"
  - name: "data_nascimento"
    type: "date"
    format: "yyyy-MM-dd"
  - name: "data_obito"
    type: "date"
    format: "yyyy-MM-dd"
  - name: "municipio_obito"
    type: "keyword"
  - name: "uf_obito"
    type: "keyword"
  - name: "causa_basica"
    type: "text"
    analyzer: "brazilian"        # analyzer built-in de português (stemming + stopwords)
  # Campos numérico e booleano — cobrem mapeamentos ES além de text/keyword/date.
  - name: "idade_obito"
    type: "integer"
  - name: "obito_violento"
    type: "boolean"
  # Campos informativos, recuperados no resultado via `extra_target_fields` da
  # spec de linkage (não participam de regras de comparação).
  - name: "numero_declaracao"
    type: "keyword"
    ignore_above: 32             # strings acima de 32 chars não são indexadas
  - name: "local_obito"
    type: "keyword"