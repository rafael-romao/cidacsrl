source_config:
  source_table: "nascimentos_example"
  id_field: "codigo_nascimento"


index_config:  
  name: "nascimentos_example_index"
  id_from_source: True  
  number_of_shards: 1
  number_of_replicas: 0
  refresh_interval: "1s"

index_columns:
  - name: "codigo_nascimento"
    type: "keyword"
  - name: "nome_completo"
    type: "text"
    index_as: "both"
  - name: "nome_mae"
    type: "text"
    index_as: "both"
  - name: "data_nascimento"
    type: "date"
    format: "yyyy-MM-dd"
  - name: "municipio_nascimento"
    type: "keyword"
  - name: "uf_nascimento"
    type: "keyword"